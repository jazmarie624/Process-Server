    title: "What Is 'Process'?",
    icon: "📄",
    content: `Process is any official court document that commands a person to do something — or stop doing something. Think of it as the court's way of tapping someone on the shoulder and saying "Hey, you're involved in a legal case!"

COMMON TYPES OF PROCESS:
• SUMMONS — tells someone they've been sued and must respond
• COMPLAINT — describes what the lawsuit is about
• SUBPOENA — orders someone to appear in court or produce documents
• WRITS — court orders commanding specific actions
• INJUNCTIONS — orders requiring someone to stop doing something

🔑 KEY RULE: Due process under the U.S. Constitution guarantees NO ONE can be taken to court without being properly notified first. Service of process is how that notification happens. Without it, a case can be thrown out entirely!

⚖️ WHY SERVICE MATTERS SO MUCH:
Process must be delivered correctly for the court to have legal power — called JURISDICTION — over the person being sued. If service is done incorrectly, the court cannot legally act, and any judgment entered could later be thrown out, even after a year has passed!

📋 THE 4 REQUIREMENTS FOR PROCESS TO BE VALID:
1. Must contain the SEAL of the court
2. Must be SIGNED by the person who served it
3. Must contain the required SERVICE INFORMATION (date, time, manner, etc.)
4. Must be served in the MANNER PRESCRIBED BY LAW

💡 MEMORY TIP: No valid service = no valid judgment, no matter how strong the case is!`

1. 🏛️ THE SHERIFF — the default server in every county.

2. ⭐ SPECIAL PROCESS SERVER — appointed by the sheriff for a specific county. Must be 18+, Florida resident, pass background check and exam.

3. 🎓 CERTIFIED PROCESS SERVER (CPS) — that's YOU! Certified by the Chief Judge of the Judicial Circuit. Can serve anywhere within that circuit.

🔑 A CPS serves initial nonenforceable CIVIL process — NOT criminal warrants or judgment enforcement.

❌ WHO CANNOT SERVE: Parties to the case, anyone under 18, anyone with a legal disability.

🚨 §48.021(4) — Making a FALSE RETURN of service is a FELONY OF THE THIRD DEGREE. Permanent bar from serving in Florida. This is serious!`

• Exact address

    content: `A subpoena is a court order requiring someone to appear or produce documents. You'll serve these CONSTANTLY as a process server!

Commands a person to PRODUCE documents, records, or evidence.
• Very common in civil litigation
• Used to get bank records, phone records, business documents
